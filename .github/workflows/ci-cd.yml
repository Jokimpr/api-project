name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 selenium

    - name: Run linting
      run: |
        flake8 run.py app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 run.py app tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        python -m pytest tests/test_app.py -v --cov=app --cov-report=xml

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Start Flask app
      run: |
        nohup python run.py >/tmp/flask.log 2>&1 &
        for i in {1..10}; do
          if curl --silent --fail http://127.0.0.1:5000/login >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        cat /tmp/flask.log
        exit 1

    - name: Run Selenium tests
      run: |
        python -m pytest tests/test_selenium.py -m selenium -v
